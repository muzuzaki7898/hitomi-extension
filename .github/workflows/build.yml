name: Build Hitomi Only

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-command-action@v2

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore signingkey.jks -alias extension -keyalg RSA -keysize 2048 -validity 10000 -storepass tachiyomi -keypass tachiyomi -dname "CN=Mihon"

      - name: Build APK
        env:
          ALIAS: extension
          KEY_STORE_PASSWORD: tachiyomi
          KEY_PASSWORD: tachiyomi
        run: ./gradlew :src:all:hitomi:assembleRelease

      - name: Create Repo JSON
        run: |
          mkdir -p repo
          echo '[{"name":"Hitomi","pkg":"eu.kanade.tachiyomi.extension.all.hitomi","apk":"src/all/hitomi/build/outputs/apk/release/hitomi-release.apk","versionCode":45,"versionName":"1.4.45","nsfw":1}]' > repo/index.min.json

      - name: Deploy to Branch Repo
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions
          author_email: github-actions@github.com
          message: "Update Hitomi Repo"
          new_branch: repo
